kind: pipeline
type: docker
name: build-and-test

trigger:
  branch:
    - main
  event:
    - push
    - pull_request

steps:
  - name: setup
    image: golang:1.26.2-alpine
    commands:
      - apk add --no-cache git make
      - go mod download

  - name: lint
    image: golang:1.26.2-alpine
    commands:
      - go fmt ./...
      - go vet ./...

  - name: test
    image: golang:1.26.2-alpine
    commands:
      - go test -v -race -coverpkg=./... ./...

  - name: build
    image: golang:1.26.2-alpine
    commands:
      - make build
    when:
      event:
        - push
        - pull_request

---
kind: pipeline
type: docker
name: release

trigger:
  ref:
    - refs/tags/v*

steps:
  - name: build
    image: golang:1.26.2-alpine
    commands:
      - apk add --no-cache make
      - make build

  - name: publish-release
    image: plugins/github-release
    settings:
      api_key:
        from_secret: GITHUB_PAT
      files:
        - bin/*
      checksum: sha256
    when:
      ref:
        - refs/tags/v*

---
kind: pipeline
type: ssh
name: deploy

server:
  host: 
    from_secret: MCP_SERVER_HOST
  user: 
    from_secret: MCP_SSH_USER
  password:
    from_secret: MCP_SSH_PASSWORD

steps:
  - name: deploy
    environment:
      INSTALLATION_DIR:
        from_secret: INFISICAL_CLIENT_ID  
    commands:
      - CURRENT_PATH=$(pwd) 
      - cd ${INSTALLATION_DIR}
      - mcpbridgego --stop || true
      - cd ${CURRENT_PATH}
      - make build
      - cp bin/mcpbridgego ${INSTALLATION_DIR}
      - cd ${INSTALLATION_DIR}
      - mcpbridgego --start
       